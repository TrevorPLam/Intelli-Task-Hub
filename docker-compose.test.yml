version: '3.8'

services:
  test-db:
    image: postgres:16-alpine
    container_name: intellitaskhub-test-db
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: intellitaskhub_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d intellitaskhub_test"]
      interval: 1s
      timeout: 5s
      retries: 5
    volumes:
      - test_db_data:/var/lib/postgresql/data

volumes:
  test_db_data:
