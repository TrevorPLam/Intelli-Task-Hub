name: AudioWorklet Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'lib/integrations-openai-ai-react/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lib/integrations-openai-ai-react/**'

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v1'

jobs:
  # Lint and format check
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Run ESLint
        run: |
          cd lib/integrations-openai-ai-react
          npm run lint || true

      - name: Check formatting
        run: |
          cd lib/integrations-openai-ai-react
          npm run format:check || true

  # Unit tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Run unit tests
        run: |
          cd lib/integrations-openai-ai-react
          npm test -- --coverage --watchAll=false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: lib/integrations-openai-ai-react/coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build and package
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Build package
        run: |
          cd lib/integrations-openai-ai-react
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: lib/integrations-openai-ai-react/dist/
          retention-days: 7

  # Playwright tests across browsers
  playwright-tests:
    name: Playwright Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        include:
          - browser: chromium
            device: 'Desktop Chrome'
          - browser: firefox
            device: 'Desktop Firefox'
          - browser: webkit
            device: 'Desktop Safari'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: lib/integrations-openai-ai-react/dist/

      - name: Install Playwright browsers
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright install ${{ matrix.browser }}

      - name: Start test server
        run: |
          cd lib/integrations-openai-ai-react
          npm run serve:test &
          sleep 10

      - name: Run Playwright tests
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright test --project=${{ matrix.browser }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            lib/integrations-openai-ai-react/playwright-report/
            lib/integrations-openai-ai-react/test-results/
          retention-days: 7

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.browser == 'chromium'
        with:
          directory: lib/integrations-openai-ai-react/playwright-coverage/
          token: ${{ secrets.CODECOV_TOKEN }}

  # Mobile device tests
  mobile-tests:
    name: Mobile Tests (${{ matrix.device }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        device: ['Pixel 5', 'iPhone 13', 'iPad Pro']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: lib/integrations-openai-ai-react/dist/

      - name: Install Playwright browsers
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright install

      - name: Start test server
        run: |
          cd lib/integrations-openai-ai-react
          npm run serve:test &
          sleep 10

      - name: Run mobile tests
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright test --project=mobile-${{ matrix.device }}

      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-results-${{ matrix.device }}
          path: |
            lib/integrations-openai-ai-react/playwright-report/
            lib/integrations-openai-ai-react/test-results/
          retention-days: 7

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: lib/integrations-openai-ai-react/dist/

      - name: Install Playwright browsers
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright install chromium

      - name: Start test server
        run: |
          cd lib/integrations-openai-ai-react
          npm run serve:test &
          sleep 10

      - name: Run performance tests
        run: |
          cd lib/integrations-openai-ai-react
          npx playwright test --grep="Performance" --project=chromium

      - name: Analyze performance results
        run: |
          cd lib/integrations-openai-ai-react
          node scripts/analyze-performance.js

      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: lib/integrations-openai-ai-react/performance-reports/
          retention-days: 30

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run security audit
        run: |
          cd lib/integrations-openai-ai-react
          npm audit --audit-level=moderate || true

      - name: Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # Deploy to staging (on main branch)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [playwright-tests, mobile-tests, performance-tests, security-audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lib/integrations-openai-ai-react/package-lock.json

      - name: Install dependencies
        run: |
          cd lib/integrations-openai-ai-react
          npm ci

      - name: Build for production
        run: |
          cd lib/integrations-openai-ai-react
          npm run build

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here

      - name: Run post-deployment tests
        run: |
          echo "Running post-deployment validation..."
          # Add post-deployment test commands here

  # Performance regression check
  performance-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: [performance-tests]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download performance results
        uses: actions/download-artifact@v4
        with:
          name: performance-results
          path: performance-results/

      - name: Compare with baseline
        run: |
          echo "Comparing performance against baseline..."
          # Add performance comparison logic here

      - name: Comment on PR
        uses: actions/github-script@v8
        if: failure()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Performance regression detected! Please review the performance test results.'
            })

  # Results summary
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, playwright-tests, mobile-tests, performance-tests]
    if: always()
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: "*-results-*"
          merge-multiple: true
          path: all-results/

      - name: Generate summary report
        run: |
          echo "# Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Status" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright Tests: ${{ needs.playwright-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile Tests: ${{ needs.mobile-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports uploaded to Codecov" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test reports and screenshots available in artifacts" >> $GITHUB_STEP_SUMMARY
