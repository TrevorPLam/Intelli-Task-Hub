name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type check
        run: pnpm typecheck

      - name: Check code formatting
        run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: intellitaskhub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/intellitaskhub_test
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: |
          cd lib/db
          pnpm drizzle-kit push

      - name: Run unit tests
        run: pnpm test:coverage

      - name: Run integration tests
        run: |
          cd artifacts/api-server
          pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: github.event_name == 'push'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Check coverage thresholds
        run: |
          # Check if coverage meets minimum thresholds
          COVERAGE_THRESHOLD=80

          if [ -f "coverage/coverage-summary.json" ]; then
            LINES_COVERAGE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.lines.pct)")
            FUNCTIONS_COVERAGE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.functions.pct)")
            BRANCHES_COVERAGE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.branches.pct)")
            STATEMENTS_COVERAGE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8')).total.statements.pct)")
            
            echo "Lines Coverage: $LINES_COVERAGE%"
            echo "Functions Coverage: $FUNCTIONS_COVERAGE%"
            echo "Branches Coverage: $BRANCHES_COVERAGE%"
            echo "Statements Coverage: $STATEMENTS_COVERAGE%"
            
            # Check if all coverages meet threshold
            if (( $(echo "$LINES_COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "✅ Lines coverage meets threshold ($LINES_COVERAGE% >= $COVERAGE_THRESHOLD%)"
            else
              echo "❌ Lines coverage below threshold ($LINES_COVERAGE% < $COVERAGE_THRESHOLD%)"
              exit 1
            fi
            
            if (( $(echo "$FUNCTIONS_COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "✅ Functions coverage meets threshold ($FUNCTIONS_COVERAGE% >= $COVERAGE_THRESHOLD%)"
            else
              echo "❌ Functions coverage below threshold ($FUNCTIONS_COVERAGE% < $COVERAGE_THRESHOLD%)"
              exit 1
            fi
            
            if (( $(echo "$BRANCHES_COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "✅ Branches coverage meets threshold ($BRANCHES_COVERAGE% >= $COVERAGE_THRESHOLD%)"
            else
              echo "❌ Branches coverage below threshold ($BRANCHES_COVERAGE% < $COVERAGE_THRESHOLD%)"
              exit 1
            fi
            
            if (( $(echo "$STATEMENTS_COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "✅ Statements coverage meets threshold ($STATEMENTS_COVERAGE% >= $COVERAGE_THRESHOLD%)"
            else
              echo "❌ Statements coverage below threshold ($STATEMENTS_COVERAGE% < $COVERAGE_THRESHOLD%)"
              exit 1
            fi
          else
            echo "❌ Coverage report not found"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
